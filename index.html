   en:{name:'Ginjinha Rubi — The Local Choice',subtitle:'Since 1931 — the one the locals actually use',story:'One minute from the two famous rivals, Ginjinha Rubi has been quietly serving since 1931 — and because it is slightly off the main path, it is where the locals actually go. Beautiful blue-and-white azulejo tile panels inside depicting the cherry harvest. Smoother, slightly more robust flavour. Less crowded, same price. This is your hidden gem version of the ginjinha experience — exactly what your brand promises.',longStory:undefined,tip:'Take groups here instead of the famous ones. "The other two are famous. This one the locals use. Since 1931. Look at those tiles."'},
   de:{name:'Ginjinha Rubi — Die Wahl der Einheimischen',subtitle:'Seit 1931 — die, die die Einheimischen wirklich nutzen',story:'Eine Minute von den zwei Berumtheiten entfernt, serviert die Ginjinha Rubi seit 1931 ruhig vor sich hin — etwas abseits des Hauptweges, deshalb der Ort, wo Einheimische wirklich hingehen. Schone blaue und weisse Azulejo-Kacheln innen. Gleichermassen gut, weniger Gedrange.',longStory:undefined,tip:'Gruppen hierher bringen statt zu den berumhten. "Die anderen zwei sind beruhmt. Diese benutzen die Einheimischen. Seit 1931. Schauen Sie sich diese Kacheln an."'}},
  {id:'manteigaria',lat:38.7113,lon:-9.1385,mapsSearch:'Manteigaria Pastel de Nata Lisboa Rua Augusta',tour:0,cat:'food',foodType:'both',tags:['Pastel de Nata','Best in Lisbon','Watch It Made','Custard Tart','Rua Augusta'],
   en:{name:'Manteigaria — Many locals\' favourite nata',subtitle:'Watch it being made. Eat it warm. Add cinnamon.',story:'Many Lisbon locals consider Manteigaria the best pastel de nata in the city. They make only nata and coffee — no distractions. You can watch through the window as they roll the dough and fill the tarts. Always warm, always freshly made. The crust is flaky and buttery, the custard rich with vanilla. About €1.50. Multiple locations but Rua Augusta is the one to use on your tour route. The monks of Jeronimos Monastery invented this tart in the 18th century to use leftover egg yolks from starching habits.',longStory:undefined,tip:'"These were invented by monks who needed to use up leftover egg yolks. Stand at the counter, eat it warm, add cinnamon. That is how locals eat it."'},
   de:{name:'Manteigaria — Liebling vieler Lissaboner',subtitle:'Zuschauen beim Backen. Warm essen. Zimt drauf.',story:'Viele Lissaboner halten Manteigaria fur den besten Pastel de Nata der Stadt. Nur Nata und Kaffee — keine Ablenkungen. Durch das Fenster konnen Sie die Zubereitung beobachten. Immer warm, frisch gebacken. Ca. 1,50 Euro.',longStory:undefined,tip:'"Von Monchen erfunden, die ubrige Eigelb verwerten mussten. Am Tresen stehen, warm essen, Zimt drauf. So essen es die Einheimischen."'}},
  {id:'nova_pombalina',lat:38.712,lon:-9.1385,mapsSearch:'Cafetaria Nova Pombalina Lisboa Baixa',tour:0,cat:'food',foodType:'local',tags:['Local Cafe','Pastel de Nata','Queijada','Personal Favourite','Baixa'],
   en:{name:'Cafetaria Nova Pombalina',subtitle:'The guide\'s own spot — real Lisbon cafe',story:'This is where your guide eats. A proper local cafe in Baixa — no tourist prices, no English menus at the door, just Portuguese workers having their morning bica and pastel de nata. The queijada here is worth trying if they have it: a Sintra-style tart made with fresh cheese and cinnamon, older and denser than a nata, from a different monastery tradition entirely.',longStory:undefined,tip:'Personal endorsement is everything here. "I eat here myself. That\'s the whole recommendation."'},
   de:{name:'Cafetaria Nova Pombalina',subtitle:'Der eigene Stammplatz des Guides — echtes Lissaboner Cafe',story:'Hier isst Ihr Guide. Ein echtes lokales Cafe in Baixa — keine Touristenpreise, keine englischen Menus an der Tur, nur portugiesische Arbeiter bei ihrer Morgen-Bica. Die Queijada hier ist einen Versuch wert: eine Sintra-Torte aus Frischkase und Zimt.',longStory:undefined,tip:'Personliche Empfehlung ist hier alles. "Ich esse hier selbst. Das ist die ganze Empfehlung."'}},
  {id:'sto_antonio_nata',lat:38.7107,lon:-9.1340,mapsSearch:'Pastelaria Santo Antonio Lisboa Alfama Rua do Milagre',tour:0,cat:'food',foodType:'local',tags:['Pastel de Nata','Award Winner 2019','Alfama','Local Cafe','Best Alfama Nata'],
   en:{name:'Pastelaria Santo Antonio',subtitle:'Award-winning nata — right next to the castle',story:'Tucked in Alfama between the castle and the cathedral, Pastelaria Santo Antonio won the Best Pastel de Nata award in Lisbon in 2019. The tart here has a beautiful dark cinnamon colour on top, a rich eggy custard and a perfectly flaky crust. About €1.20. Two floors — fast service downstairs, sit-down upstairs. Natural stop after the castle visit.',longStory:undefined,tip:'Natural stop after Castelo Sao Jorge. "Best nata in Alfama. The judges agreed — they gave it the award in 2019."'},
   de:{name:'Pastelaria Santo Antonio',subtitle:'Preisgekronter Nata — direkt neben der Burg',story:'Versteckt in Alfama zwischen Burg und Kathedrale, gewann die Pastelaria Santo Antonio 2019 den Besten-Pastel-de-Nata-Preis in Lissabon. Schone dunkle Zimtfarbe oben, reiches Eiercreme-Inneres. Ca. 1,20 Euro.',longStory:undefined,tip:'Naturlicher Stopp nach dem Castelo Sao Jorge. "Bester Nata in Alfama. Die Jury stimmte zu — Preis 2019."'}},
  {id:'bifana_afonso',lat:38.712,lon:-9.1347,mapsSearch:'As Bifanas do Afonso Lisboa Rua da Madalena Alfama',tour:0,cat:'food',foodType:'local',tags:['Bifana','Best Bifana','Rua da Madalena','Bourdain','Cash Only','Standing Room'],
   en:{name:'As Bifanas do Afonso',subtitle:'The king of Lisbon\'s greatest sandwich',story:'Look through the window as you approach: a bubbling cauldron of pork simmering in white wine, garlic and paprika. This is Lisbon\'s most famous bifana spot — Anthony Bourdain featured it on his show. Standing room only, cash only, about €3. The pork is slow-cooked until it falls apart, soaked in the wine-garlic sauce, stuffed into a crusty roll. Add mustard. Always add mustard. A second location opened in 2025 at Rua dos Sapateiros with actual seating — same recipe, shorter queue.',longStory:undefined,tip:'"This is the most famous bifana in Lisbon. Anthony Bourdain called it glory on a plate. €3, cash, mustard. That is all you need to know."'},
   de:{name:'As Bifanas do Afonso',subtitle:'Der Konig von Lissabons grosstem Sandwich',story:'Schauen Sie durch das Fenster: ein blubbernder Kessel Schweinefleisch in Weisswein, Knoblauch und Paprika. Dies ist Lissabons beruhmtester Bifana-Ort — von Anthony Bourdain in seiner Sendung vorgestellt. Nur Stehplatz, nur Bar, ca. 3 Euro. Eine zweite Filiale offnete 2025 in der Rua dos Sapateiros mit Sitzplatzen.',longStory:undefined,tip:'"Das ist die beruhmteste Bifana Lissabons. Bourdain nannte es Herrlichkeit auf einem Teller. 3 Euro, Bargeld, Senf. Das ist alles."'}},
  {id:'o_trevo',lat:38.7104,lon:-9.1424,mapsSearch:'O Trevo Lisboa Praca Luis de Camoes bifana Bourdain',tour:0,cat:'food',foodType:'tourist',tags:['Bifana','Bourdain','Chiado','Camoes Square','O Trevo'],
   en:{name:'O Trevo — Bourdain\'s Bifana',subtitle:'Right on the square named after Portugal\'s greatest poet',story:'O Trevo sits on Praca Luis de Camoes and is famous as the bifana spot Anthony Bourdain specifically endorsed. Bifanas served on carcass bread with the meat sticking out, good sauce. Also serves pregos (beef version), rissois and other Portuguese snacks. Great location — you are already on the square when you stop at the Camoes statue, so this is the natural food extension of that story.',longStory:undefined,tip:'Natural combo: stop at Camoes statue for the story, then "that bar on the corner is where Bourdain ate his bifana."'},
   de:{name:'O Trevo — Bourdains Bifana',subtitle:'Direkt auf dem Platz benannt nach Portugals grosstem Dichter',story:'O Trevo liegt am Praca Luis de Camoes und ist beruhmt als der Bifana-Ort, den Bourdain personlich empfahl. Bifanas auf Crusty Bread, gute Sauce. Auch Pregos und andere Snacks.',longStory:undefined,tip:'Naturliche Kombination: Camoes-Statue fur die Geschichte, dann "die Bar an der Ecke ist, wo Bourdain seine Bifana ass."'}},
  {id:'tendinha',lat:38.7143,lon:-9.1393,mapsSearch:'A Tendinha Rossio Lisboa bacalhau snack bar',tour:0,cat:'food',foodType:'local',tags:['Bacalhau Cakes','Salgados','Rossio','Local Snack Bar','Alfredo','Traditional'],
   en:{name:'A Tendinha — The real Rossio snack bar',subtitle:'Standing at the bar since 1840 — police, guides, locals',story:'One of the last traditional snack bars in Rossio, A Tendinha is known for excellent, large pasteis de bacalhau (codfish cakes). Stand at the bar elbow-to-elbow with police officers and locals. About €1.50 per piece. Alfredo behind the bar has worked here since 1998. He was once quoted saying he used to see a tourist every couple of months — now 70% of his customers are tourists. The soul of the place is still entirely local.',longStory:undefined,tip:'"Stand at the bar, order two codfish cakes, watch Alfredo. This place has not changed in 50 years."'},
   de:{name:'A Tendinha — Die echte Rossio-Snackbar',subtitle:'Am Tresen seit 1840 — Polizisten, Guides, Einheimische',story:'Eine der letzten traditionellen Snackbars am Rossio, bekannt fur ausgezeichnete, grosse Pasteis de Bacalhau. Am Tresen stehen Schulter an Schulter mit Polizisten. Ca. 1,50 Euro. Alfredo hinter dem Tresen arbeitet seit 1998 hier.',longStory:undefined,tip:'"Am Tresen stehen, zwei Dorschkuchen bestellen, Alfredo beobachten. Dieser Ort hat sich in 50 Jahren nicht verandert."'}},
  {id:'delirium',lat:38.7071,lon:-9.1437,mapsSearch:'Delirium Cafe Lisboa Calcada Nova de Sao Francisco',tour:0,cat:'food',foodType:'tourist',tags:['2000+ Beers','Guinness World Record','Belgian Beer','Cais do Sodre','Austrian German Beers'],
   en:{name:'Delirium Cafe Lisboa',subtitle:'2000+ beers. Guinness World Record.',story:'One of the world\'s most famous beer bars — the original Brussels location holds a Guinness World Record for the most beers available. The Lisbon location is at Calcada Nova de Sao Francisco 2A, near Cais do Sodre. Over 2000 beers from dozens of countries including Austrian, German and Belgian classics.',longStory:undefined,tip:'"I know a bar near here with over 2000 beers including beers from your country — holds a Guinness World Record." Works every time for German and Austrian tourists.'},
   de:{name:'Delirium Cafe Lisboa',subtitle:'2000+ Biere. Guinness-Weltrekord.',story:'Eine der beruhmtesten Bierbars der Welt. Lissaboner Filiale in der Calcada Nova de Sao Francisco 2A, nahe Cais do Sodre. Uber 2000 Biere aus Dutzenden Landern.',longStory:undefined,tip:'"Ich kenne eine Bar hier in der Nahe mit uber 2000 Bieren aus Ihrem Land — Guinness-Weltrekord." Funktioniert bei Deutschen und Osterreichern jedes Mal.'}},
  {id:'museu_cerveja',lat:38.7081,lon:-9.1379,mapsSearch:'Museu da Cerveja Lisboa Terreiro do Paco Beer Museum',tour:0,cat:'food',foodType:'tourist',tags:['Beer Museum','Interactive','Rooftop Bar','Praca do Comercio','Added by Guide'],
   en:{name:'Museu da Cerveja — Beer Museum',subtitle:'Interactive beer museum with rooftop bar at Praca do Comercio',story:'Right at Praca do Comercio, the Museu da Cerveja is an interactive beer experience covering the history of beer in Portugal and the world, with beer tastings and a rooftop terrace bar overlooking the Tagus and the square. Open daily 12:00 to midnight, entry about €8. Great for groups interested in something slightly different. Good afternoon or early evening suggestion.',longStory:undefined,tip:'Mention when passing Praca do Comercio. "Right here: a beer museum with a rooftop bar looking over the river. Open until midnight."'},
   de:{name:'Museu da Cerveja — Biermuseum',subtitle:'Interaktives Biermuseum mit Dachterrassen-Bar am Praca do Comercio',story:'Direkt am Praca do Comercio: ein interaktives Biererlebnis mit Verkostungen und Dachterrasse mit Blick auf Tejo und Platz. Taglich 12:00 bis Mitternacht, Eintritt ca. 8 Euro.',longStory:undefined,tip:'Beim Vorbeifahren am Praca do Comercio erwahnen. "Direkt hier: ein Biermuseum mit Dachterrassen-Bar uber dem Fluss. Bis Mitternacht offen."'}}
];


// ── COLOR SYSTEM ─────────────────────────────────────────────────────────────
function dotColor(s){
  if(s.cat==='food'){
    if(s.foodType==='local') return '#27AE8F';
    if(s.foodType==='tourist') return '#D4A017';
    return '#C9A84C';
  }
  if(s.cat==='gem') return '#27AE8F';
  if(s.cat==='viewpoint') return '#8E44AD';
  if(s.cat==='church') return '#E07B39';
  if(s.cat==='culture') return '#2980B9';
  const tc={3:'#C9A84C',5:'#E07B39',7:'#C0392B',0:'#2980B9'};
  return tc[s.tour]||'#7f9ab5';
}

function makeIcon(s,seqNum){
  const c=dotColor(s),isCore=s.tour<=3&&s.tour>0;
  const r=isCore?9:7,total=r*2+10,cx=total/2;
  const inner=s.tour===3?'<circle cx="'+cx+'" cy="'+cx+'" r="3" fill="white" opacity="0.9"/>':'';
  const glow=isCore?'<circle cx="'+cx+'" cy="'+cx+'" r="'+(r+3)+'" fill="'+c+'" opacity="0.15"/>':'';
  let seqBadge='';
  if(seqNum){
    const bx=total-8,by=2;
    seqBadge='<rect x="'+(bx-6)+'" y="'+by+'" width="14" height="10" rx="5" fill="#C0392B"/>'
             +'<text x="'+bx+'" y="'+(by+8)+'" text-anchor="middle" font-size="7" font-family="Lato,sans-serif" fill="white" font-weight="700">'+seqNum+'</text>';
  }
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+total+'" height="'+total+'">'
    +glow+'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="'+c+'" stroke="white" stroke-width="1.5"/>'
    +inner+seqBadge+'</svg>';
  return L.divIcon({html:svg,iconSize:[total,total],iconAnchor:[cx,cx],className:''});
}

function snip(text,n){n=n||85;return text&&text.length>n?text.slice(0,n)+'...':text}

function loadStopPhoto(stopId) {
  var ph = document.getElementById('panel-photo');
  ph.innerHTML = '';
  var title = WIKI_PHOTO_TITLES[stopId];
  if(!title) return;
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.thumbnail && d.thumbnail.source){
        var img = document.createElement('img');
        img.src = d.thumbnail.source.replace(/\/\d+px-/, '/400px-');
        img.alt = d.title || '';
        img.onload = function(){ img.classList.add('loaded'); };
        img.onerror = function(){ ph.innerHTML=''; };
        ph.appendChild(img);
      }
    })
    .catch(function(){});
}

    +'<div id="panel-body">'
    +'<div id="panel-photo"></div>'+'<div id="panel-story"></div>'
    +'<button id="expand-btn" onclick="toggleLongStory()"></button>'
    +'<div id="long-story-sep"></div>'
    +'<div id="long-story"></div>'
    +'<div id="panel-tags"></div>'
    +'<div id="panel-tip"></div>'
    +'<a id="panel-maps" href="#" target="_blank">Open in Google Maps</a>'
    +'</div>'
    +'</div>';
}

// ── TOUR SEQUENCES ────────────────────────────────────────────────────────────
const TOUR_SEQ={
  3:['comercio','ribeira_naus','arco_augusta','baixa','stjusta','rossio','restauradores','sto_antonio','se_cathedral','sta_luzia_view','portas','alfama_walk','castle'],
  5:['comercio','ribeira_naus','arco_augusta','baixa','stjusta','rossio','restauradores','camoes_square','sroque','alcantara_view','chiado','carmo','pessoa','adamastor'],
  7:['comercio','ribeira_naus','arco_augusta','baixa','rossio','restauradores','sto_antonio','se_cathedral','portas','alfama_walk','sta_luzia_view','castle','jardim_graca','mouraria','martim_moniz','monte','graca_view','santana','stv_fora','panteao','sroque','alcantara_view','carmo','pessoa','adamastor']
};

// ── HEADER HEIGHT ─────────────────────────────────────────────────────────────
function updateHeaderHeight(){
  var h=document.getElementById('header').offsetHeight;
  document.getElementById('app').style.paddingTop=h+'px';
  document.documentElement.style.setProperty('--hdr',h+'px');
  map.invalidateSize();
}

// ── MARKER MANAGEMENT ─────────────────────────────────────────────────────────
function getSeqNum(sid){
  if(!guideMode||currentTour===0) return null;
  const seq=TOUR_SEQ[currentTour]||[];
  const idx=seq.indexOf(sid);
  return idx>=0?idx+1:null;
}

function addMarker(s){
  if(activeMarkers[s.id]) return;
  const m=L.marker([s.lat,s.lon],{icon:makeIcon(s,getSeqNum(s.id))}).addTo(map);
  m.on('click',function(){openPanel(s.id);});
  activeMarkers[s.id]=m;
}
function removeMarker(id){if(activeMarkers[id]){map.removeLayer(activeMarkers[id]);delete activeMarkers[id]}}

function renderMarkers(){
  STOPS.forEach(function(s){
    const tourOk=currentTour===0||s.tour<=currentTour||s.tour===0;
    const catOk=currentCat==='all'||s.cat===currentCat;
    if(tourOk&&catOk) addMarker(s); else removeMarker(s.id);
  });
  Object.values(activeMarkers).forEach(function(m){
    const s=STOPS.find(function(st){return m.getLatLng().lat===st.lat&&m.getLatLng().lng===st.lon});
    if(s) m.setIcon(makeIcon(s,getSeqNum(s.id)));
  });
}

// ── ROUTES ────────────────────────────────────────────────────────────────────
function drawRoutes(tour){
  routeLayers.forEach(function(l){map.removeLayer(l)});routeLayers=[];
  if(tour===0||tour>=3){
    var r3=[[38.7075,-9.1364],[38.7064,-9.1372],[38.7079,-9.1365],[38.7105,-9.1380],[38.7116,-9.1401],[38.7139,-9.1393],[38.7171,-9.1402],[38.7100,-9.1339],[38.7097,-9.1334],[38.7109,-9.1316],[38.7117,-9.1319],[38.7120,-9.1312],[38.7139,-9.1332]];
    routeLayers.push(L.polyline(r3,{color:'#C9A84C',weight:3.5,opacity:0.92}).addTo(map));
  }
  if(tour===0||tour>=5){
    var r5=[[38.7139,-9.1393],[38.7171,-9.1402],[38.7101,-9.1422],[38.7142,-9.1438],[38.7153,-9.1430],[38.7100,-9.1415],[38.7126,-9.1408],[38.7107,-9.1421],[38.7073,-9.1468]];
    routeLayers.push(L.polyline(r5,{color:'#E07B39',weight:3,opacity:0.88,dashArray:'10,6'}).addTo(map));
  }
  if(tour===0||tour>=7){
    var r7=[[38.7139,-9.1332],[38.7160,-9.1320],[38.7163,-9.1360],[38.7162,-9.1368],[38.7170,-9.1327],[38.7168,-9.1337],[38.7205,-9.1393],[38.7155,-9.1278],[38.7148,-9.1269]];
    routeLayers.push(L.polyline(r7,{color:'#C0392B',weight:2.8,opacity:0.85,dashArray:'6,5'}).addTo(map));
  }
}

// ── GPS STATUS ────────────────────────────────────────────────────────────────
function setGpsBar(state,msg){
  var bar=document.getElementById('gps-bar');
  bar.textContent=msg;
  bar.className='show';
  if(state==='active') bar.className='show active';
  else if(state==='error') bar.className='show error';
  else if(state==='off'){bar.className='';return}
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function openPanel(id){
  const s=stopIndex[id];if(!s)return;
  const d=s[lang],c=dotColor(s);
  openStopId=id;longStoryOpen=false;
  document.getElementById('panel-category').textContent=UI[lang].catLabels[s.cat]||s.cat;
  document.getElementById('panel-category').style.cssText='background:'+c+'22;color:'+c+';font-size:8px;font-weight:700;letter-spacing:1.5px;padding:2px 8px;border-radius:10px;text-transform:uppercase';
  document.getElementById('panel-name').textContent=d.name;
  document.getElementById('panel-subtitle').textContent=d.subtitle||'';
  var fbw=document.getElementById('food-badge-wrap');fbw.innerHTML='';
  if(s.cat==='food'&&s.foodType){
    var fb=document.createElement('span');
    fb.className='food-badge food-'+s.foodType;
    fb.textContent=UI[lang].foodLabels[s.foodType]||s.foodType;
    fbw.appendChild(fb);
  }
  document.getElementById('panel-story').textContent=d.story||'';
  loadStopPhoto(id);
  var ls=document.getElementById('long-story');
  var eb=document.getElementById('expand-btn');
  var sep=document.getElementById('long-story-sep');
  ls.textContent='';ls.classList.remove('open');sep.classList.remove('open');
  if(d.longStory){ls.textContent=d.longStory;eb.textContent=UI[lang].expandBtn;eb.classList.add('visible')}
  else eb.classList.remove('visible');
  document.getElementById('panel-tags').innerHTML=(s.tags||[]).map(function(t){return'<span class="panel-tag" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'44">'+t+'</span>'}).join('');
  var tip=document.getElementById('panel-tip');
  if(d.tip){tip.textContent=UI[lang].guideTip+d.tip;tip.classList.add('show')}else tip.classList.remove('show');
  // Google Maps button — include GPS coords in URL if available
  var mapsUrl;
  if(userMarker){
    var ul=userMarker.getLatLng();
    mapsUrl='https://maps.google.com/?saddr='+ul.lat+','+ul.lng+'&daddr='+s.lat+','+s.lon;
  } else {
    mapsUrl='https://maps.google.com/?q='+encodeURIComponent(s.mapsSearch||d.name+' Lisboa');
  }
  var pm=document.getElementById('panel-maps');
  pm.href=mapsUrl;
  pm.textContent=userMarker?'Navigate in Google Maps':UI[lang].mapsBtn;
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-body').scrollTop=0;
  map.panTo([s.lat,s.lon],{animate:true,duration:0.4});
  highlightMarker(s.lat,s.lon,c);
  // After panel opens + resize settles, pan again to keep pin visible
  setTimeout(function(){
    map.invalidateSize();
    map.panTo([s.lat,s.lon],{animate:true,duration:0.3});
  },380);
  if(guideMode&&currentTour>0){
    var seq=TOUR_SEQ[currentTour]||[];
    var idx=seq.indexOf(id);
    if(idx>=0){tourIndex=idx;updateTourBar()}
  }
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  openStopId=null;
  if(selectedMarkerOverlay){map.removeLayer(selectedMarkerOverlay);selectedMarkerOverlay=null}
  setTimeout(function(){map.invalidateSize()},350);
}

function toggleLongStory(){
  longStoryOpen=!longStoryOpen;
  var ls=document.getElementById('long-story');
  var eb=document.getElementById('expand-btn');
  var sep=document.getElementById('long-story-sep');
  if(longStoryOpen){ls.classList.add('open');sep.classList.add('open');sep.textContent=UI[lang].longLabel;eb.textContent=UI[lang].collapseBtn;
    setTimeout(function(){ls.scrollIntoView({behavior:'smooth',block:'nearest'})},60)}
  else{ls.classList.remove('open');sep.classList.remove('open');eb.textContent=UI[lang].expandBtn}
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');
  document.getElementById('hdr-sub').textContent=UI[l].hdrSub;
  document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(UI[l][k])el.textContent=UI[l][k]});
  var ck=['catAll','catView','catHist','catChurch','catGem','catCult','catFood'];
  document.querySelectorAll('.cat-btn').forEach(function(b,i){if(ck[i])b.textContent=UI[l][ck[i]]});
  document.getElementById('guide-btn').textContent=(guideMode?'⏹ ':'▶ ')+UI[l].guideMode;
  renderMarkers();
  // Refresh only text in open panel — no full rebuild, no flicker
  if(openStopId){
    var _s=stopIndex[openStopId];
    if(_s){
      var _d=_s[l];
      var _el=function(id){return document.getElementById(id)};
      if(_el('panel-name'))_el('panel-name').textContent=_d.name;
      if(_el('panel-subtitle'))_el('panel-subtitle').textContent=_d.subtitle||'';
      if(_el('panel-story'))_el('panel-story').textContent=_d.story||'';
      var _tp=_el('panel-tip');
      if(_tp){if(_d.tip){_tp.textContent=UI[l].guideTip+_d.tip;_tp.classList.add('show')}else _tp.classList.remove('show')}
      var _pm=_el('panel-maps');
      if(_pm)_pm.textContent=userMarker?UI[l].navMaps:UI[l].mapsBtn;
    }
  }
  if(guideMode)updateTourBar();
}

// ── TOUR & CAT FILTERS ────────────────────────────────────────────────────────
function showTour(n,btn){
  currentTour=n;
  document.querySelectorAll('.tbadge').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');
  renderMarkers();drawRoutes(n);
  var bounds={0:[[38.699,-9.183],[38.730,-9.120]],3:[[38.704,-9.142],[38.723,-9.126]],
    5:[[38.703,-9.155],[38.720,-9.120]],7:[[38.699,-9.183],[38.730,-9.120]]};
  map.flyToBounds(bounds[n]||bounds[0],{padding:[60,60],duration:1.2});
  if(guideMode&&n>0){tourSequence=TOUR_SEQ[n]||[];tourIndex=0;updateTourBar()}
}
function toggleCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');
  renderMarkers();
}

// ── GUIDE MODE ────────────────────────────────────────────────────────────────
function toggleGuideMode(btn){
  guideMode=!guideMode;
  var tb=document.getElementById('tour-bar');
  if(guideMode){
    tb.classList.add('show');btn.classList.add('active');
    btn.textContent='⏹ '+UI[lang].guideMode;
    tourSequence=currentTour>0?(TOUR_SEQ[currentTour]||[]):[];
    tourIndex=0;updateTourBar();
    startGPS();
  } else {
    tb.classList.remove('show');btn.classList.remove('active');
    btn.textContent='▶ '+UI[lang].guideMode;
    stopGPS();
  }
  renderMarkers();
}

function updateTourBar(){
  var seq=tourSequence;
  if(!seq||seq.length===0){
    document.getElementById('tour-stop-name').textContent=lang==='de'?'Tour oben auswahlen':'Select a tour above';
    document.getElementById('tour-stop-counter').textContent='';
    document.querySelector('.tour-prev').disabled=true;
    document.querySelector('.tour-next').disabled=true;
    return;
  }
  var sid=seq[tourIndex];
  var s=stopIndex[sid];
  if(s){document.getElementById('tour-stop-name').textContent=s[lang].name}
  document.getElementById('tour-stop-counter').textContent=(tourIndex+1)+' / '+seq.length;
  document.querySelector('.tour-prev').disabled=(tourIndex===0);
  document.querySelector('.tour-next').disabled=(tourIndex>=seq.length-1);
}

function tourStep(dir){
  if(!tourSequence||tourSequence.length===0) return;
  var newIdx=tourIndex+dir;
  if(newIdx<0||newIdx>=tourSequence.length) return;
  tourIndex=newIdx;
  var s=stopIndex[tourSequence[tourIndex]];
  if(s){map.flyTo([s.lat,s.lon],16,{duration:0.9});openPanel(s.id);updateTourBar()}
}

// ── GPS ────────────────────────────────────────────────────────────────────────
var selectedRingIcon = null;
var selectedMarkerOverlay = null;

function highlightMarker(lat, lon, color) {
  // Remove old highlight
  if(selectedMarkerOverlay){map.removeLayer(selectedMarkerOverlay);selectedMarkerOverlay=null}
  var size=28;
  var ringHtml='<div style="width:'+size+'px;height:'+size+'px;border:2.5px solid '+color+';border-radius:50%;box-shadow:0 0 0 3px '+color+'44,0 0 12px '+color+'66;animation:pulse-ring 1.5s ease-out infinite;pointer-events:none;"></div>';
  var icon=L.divIcon({html:ringHtml,iconSize:[size,size],iconAnchor:[size/2,size/2],className:''});
  selectedMarkerOverlay=L.marker([lat,lon],{icon:icon,zIndexOffset:500,interactive:false}).addTo(map);
}

var userLocIcon=L.divIcon({html:'<div style="width:14px;height:14px;background:#2980B9;border:2.5px solid white;border-radius:50%;box-shadow:0 0 0 5px rgba(41,128,185,0.25)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''});

function startGPS(){
  if(!navigator.geolocation){
    setGpsBar('error','GPS not supported');
    return;
  }
  setGpsBar('','Locating...');
  var lb=document.getElementById('locate-btn');
  if(lb){lb.textContent='GPS...';lb.classList.add('active')}
  watchId=navigator.geolocation.watchPosition(
    function(pos){
      var ll=[pos.coords.latitude,pos.coords.longitude];
      if(userMarker) userMarker.setLatLng(ll);
      else userMarker=L.marker(ll,{icon:userLocIcon,zIndexOffset:1000}).addTo(map);
      gpsActive=true;
      var acc=Math.round(pos.coords.accuracy);
      setGpsBar('active','● GPS active (±'+acc+'m)');
      if(lb){lb.textContent='● GPS';lb.classList.add('active')}
      // nearest stop detection in guide mode
      if(guideMode&&currentTour>0&&tourIndex===0){
        var seq=TOUR_SEQ[currentTour]||[];
        var best=null,bestD=Infinity;
        seq.forEach(function(sid,i){
          var s=stopIndex[sid];if(!s)return;
          var d=Math.pow(s.lat-ll[0],2)+Math.pow(s.lon-ll[1],2);
          if(d<bestD){bestD=d;best=i}
        });
        if(best!==null){tourIndex=best;updateTourBar()}
      }
      // Update only the Maps button URL — no panel rebuild
      if(openStopId){
        var _s=stopIndex[openStopId];
        var _pm=document.getElementById('panel-maps');
        if(_s&&_pm){
          _pm.href='https://maps.google.com/?saddr='+ll[0]+','+ll[1]+'&daddr='+_s.lat+','+_s.lon;
          _pm.textContent=UI[lang].navMaps;
        }
      }
    },
    function(err){
      var msg;
      if(err.code===1) msg='GPS blocked — allow location in browser';
      else if(err.code===2) msg='GPS unavailable';
      else msg='GPS timeout — try again';
      // If on file:// add hint
      if(location.protocol==='file:') msg='GPS needs HTTPS — works on github.io';
      setGpsBar('error',msg);
      if(lb){lb.textContent='GPS off';lb.classList.remove('active')}
      var ghb=document.getElementById('gps-header-btn');
      if(ghb){ghb.classList.remove('active');ghb.textContent='\u25b2 GPS';}
    },
    {enableHighAccuracy:true,maximumAge:3000,timeout:12000}
  );
}

function stopGPS(){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}
  gpsActive=false;
  if(userMarker){map.removeLayer(userMarker);userMarker=null}
  setGpsBar('off','');
  var lb=document.getElementById('locate-btn');
  if(lb){lb.textContent='GPS';lb.classList.remove('active')}
}

function locateMe(){
  if(userMarker){
    map.flyTo(userMarker.getLatLng(),17,{duration:1.0});
    return;
  }
  startGPS();
  // after GPS acquired, fly to it — handled in watchPosition callback
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPanelHTML();
updateHeaderHeight();
window.addEventListener('resize',function(){updateHeaderHeight();map.invalidateSize()});
renderMarkers();drawRoutes(0);
setTimeout(function(){map.invalidateSize()},200);
</script>
